<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 645 460" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#999"/>
    </marker>
    <marker id="drop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
  </defs>

  <!-- zones: amber = newly worth it, green = always worth it -->
  <rect x="177.6" y="70" width="96.4" height="325" fill="#f6efe2"/>
  <rect x="274" y="70" width="331" height="325" fill="#eef4ef"/>

  <!-- threshold: probably worth automating -->
  <line x1="95" y1="258.5" x2="605" y2="258.5" stroke="#555" stroke-width="1.4" stroke-dasharray="5 4"/>

  <!-- frontiers (also the zone boundaries) -->
  <line x1="274" y1="70" x2="274" y2="395" stroke="#cccccc" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="177.6" y1="70" x2="177.6" y2="395" stroke="#9a9a9a" stroke-width="1"/>
  <path d="M274,390 L270,399 L278,399 z" fill="#c2c2c2"/>
  <path d="M177.6,390 L173.6,399 L181.6,399 z" fill="#8a8a8a"/>

  <!-- axes -->
  <line x1="95" y1="395" x2="617" y2="395" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="95" y1="395" x2="95" y2="56" stroke="#999" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- old effort curve (before AI) -->
  <polyline fill="none" stroke="#b3b3b3" stroke-width="2" stroke-dasharray="5 4" stroke-linejoin="round"
    points="95,70 115.4,104.8 135.8,135.1 156.2,161.4 176.6,184.3 197,204.2 217.4,221.4 237.8,236.5 258.2,249.5 274,258.5 278.6,260.9 299,270.8 319.4,279.4 339.8,286.8 360.2,293.3 380.6,299 401,303.9 421.4,308.1 441.8,311.8 462.2,315.1 482.6,317.8 503,320.3 523.4,322.4 543.8,324.2 564.2,325.8 584.6,327.2 605,328.5"/>

  <!-- new effort curve (with AI) -->
  <polyline fill="none" stroke="#1a1a1a" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"
    points="95,128.5 115.4,170.9 135.8,205.7 156.2,234.1 176.6,257.4 177.6,258.5 197,276.4 217.4,292 222.5,295.5 237.8,304.8 258.2,315.2 278.6,323.8 299,330.8 319.4,336.6 339.8,341.3 360.2,345.1 380.6,348.3 401,350.8 421.4,352.9 441.8,354.7 462.2,356.1 482.6,357.3 503,358.2 523.4,359 543.8,359.6 564.2,360.1 584.6,360.6 605,360.9"/>

  <!-- highlighted workflow: dropped from above the line to below it -->
  <line x1="222.5" y1="231" x2="222.5" y2="289" stroke="#444" stroke-width="1.6" marker-end="url(#drop)"/>
  <line x1="330" y1="150" x2="227" y2="223" stroke="#c4c4c4" stroke-width="1"/>
  <circle cx="222.5" cy="225.4" r="4" fill="#ffffff" stroke="#888" stroke-width="1.6"/>
  <circle cx="222.5" cy="295.5" r="4.5" fill="#1a1a1a"/>

  <!-- title -->
  <text x="95" y="36" font-size="15" font-weight="600" fill="#222">As AI lowers the effort, the frontier moves left</text>

  <!-- callout for the highlighted workflow -->
  <text x="334" y="142" font-size="12.5" fill="#333">an implicit workflow:</text>
  <text x="334" y="158" font-size="12" fill="#777">high pain, recurring, little data</text>

  <!-- now worth automating -->
  <text x="222.5" y="332" font-size="12.5" font-weight="600" fill="#1a1a1a" text-anchor="middle">now worth automating</text>

  <!-- curve labels -->
  <text x="598" y="300" font-size="12" fill="#9a9a9a" text-anchor="end">before AI</text>
  <text x="598" y="378" font-size="12" fill="#1a1a1a" text-anchor="end">with AI</text>

  <!-- threshold label -->
  <text x="599" y="250" font-size="12.5" font-style="italic" fill="#555" text-anchor="end">probably worth automating</text>

  <!-- y-axis -->
  <text transform="rotate(-90 28 232)" x="28" y="232" font-size="12.5" fill="#555" text-anchor="middle">human effort to automate</text>
  <text x="86" y="74" font-size="10.5" fill="#bbb" text-anchor="end">high</text>
  <text x="86" y="393" font-size="10.5" fill="#bbb" text-anchor="end">low</text>

  <!-- x-axis -->
  <text x="350" y="437" font-size="12.5" fill="#555" text-anchor="middle">quality / availability of usable data</text>
  <text x="100" y="412" font-size="10.5" fill="#bbb">low</text>
  <text x="605" y="412" font-size="10.5" fill="#bbb" text-anchor="end">high</text>
  <text x="177.6" y="412" font-size="11" font-style="italic" fill="#777" text-anchor="middle">new frontier</text>
  <text x="274" y="412" font-size="11" font-style="italic" fill="#aaa" text-anchor="middle">old frontier</text>
</svg>
