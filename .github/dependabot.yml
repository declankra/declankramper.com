version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 2
    allow:
      - dependency-name: "posthog-js"
      - dependency-name: "posthog-node"
    labels:
      - "dependencies"
      - "posthog"
